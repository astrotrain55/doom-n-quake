<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Doom`n`Quake</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body>
    <div class="game">
      <figure class="game__item js-game" data-game="DOOM">
        <figcaption class="game__title">
          <img src="./assets/text/doomu.png" alt="The Ultimate Doom">
        </figcaption>
        <img class="game__img" src="./assets/i/doomu.jpg" alt="The Ultimate Doom">
      </figure>
      <figure class="game__item js-game" data-game="DOOM2">
        <figcaption class="game__title">
          <img src="./assets/text/doom2.png" alt="Doom II: Hell on Earth">
        </figcaption>
        <img class="game__img" src="./assets/i/doom2.jpg" alt="Doom II: Hell on Earth">
      </figure>
    </div>
    <script src="./node_modules/nw-dev/lib/dev.js"></script>
    <script src="./assets/js/scripts.js"></script>
  </body>
</html>
