<!DOCTYPE html>
<html>
  <head>
    <title>Doom`n`Quake</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div class="wrapper">
      <figure class="game" data-game="DOOM">
        <img class="game__img" src="assets/img/1.jpg" alt="The Ultimate Doom">
        <figcaption class="game__title">The Ultimate Doom</figcaption>
      </figure>
      <figure class="game" data-game="DOOM2">
        <img class="game__img" src="assets/img/2.jpg" alt="Doom II: Hell on Earth">
        <figcaption class="game__title">Doom II: Hell on Earth</figcaption>
      </figure>
      <audio src="assets/TAUNT.ogg"></audio>
    </div>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/scripts.js"></script>
  </body>
</html>
